<div class="container-fluid mt-4">
    <div class="row h-100">
        <!-- Left Column -->
        <div class="col-md-6 d-flex flex-column p-3">
            <!-- Deck URL Input -->
            <div class="mb-3">
                <label for="leftDeckUrl" class="form-label fw-semibold">Decklist URL (Moxfield or Archidekt)</label>
                <input type="url" id="leftDeckUrl" class="form-control fixed-input" placeholder="Enter decklist URL">
            </div>

            <!-- Raw Decklist Input -->
            <div class="flex-grow-1">
                <label for="leftRawDecklist" class="form-label fw-semibold">Or Paste Raw Decklist</label>
                <textarea id="leftRawDecklist" class="form-control expandable-textarea"
                    placeholder="Paste raw decklist here"></textarea>
            </div>
        </div>

        <!-- Right Column -->
        <div class="col-md-6 d-flex flex-column p-3">
            <!-- Deck URL Input -->
            <div class="mb-3">
                <label for="rightDeckUrl" class="form-label fw-semibold">Decklist URL (Moxfield or Archidekt)</label>
                <input type="url" id="rightDeckUrl" class="form-control fixed-input" placeholder="Enter decklist URL">
            </div>

            <!-- Raw Decklist Input -->
            <div class="flex-grow-1">
                <label for="rightRawDecklist" class="form-label fw-semibold">Or Paste Raw Decklist</label>
                <textarea id="rightRawDecklist" class="form-control expandable-textarea"
                    placeholder="Paste raw decklist here"></textarea>
            </div>
        </div>
    </div>
</div>
