<div class="container d-flex justify-content-center mt-5">
    <div class="col-md-8 position-relative">
        <div class="input-group-container position-relative">
            <form (ngSubmit)="searchCard()">
                <div class="input-group mb-0">
                    <input type="text" class="form-control" placeholder="Search for a card..." [(ngModel)]="searchTerm"
                        name="searchTerm" (input)="onInputChange()" (keydown)="handleKeyDown($event)"
                        (focus)="onInputFocus()" (blur)="onInputBlur()" />
                    <button type="submit" class="btn btn-primary" tabindex="0">
                        Search
                    </button>
                </div>
            </form>

            <!-- Suggestions dropdown -->
            <ul *ngIf="showSuggestions" class="list-group position-absolute w-100 shadow"
                style="z-index: 1000; top: 100%;">
                <li *ngFor="let suggestion of suggestions; let i = index" class="list-group-item list-group-item-action"
                    [class.active]="i === activeIndex" (click)="selectSuggestion(suggestion)">
                    <span [innerHTML]="suggestion | highlight:userInput"></span>
                </li>
            </ul>
        </div>

        <!-- Card Info Section -->
        <div class="row mt-4" *ngIf="cardImage || cardName">
            <div class="col-md-4">
                <img [src]="hoveredPrintImage || cardImage" class="img-fluid rounded shadow main-card-img" alt="Card Image" />
            </div>
            <div class="col-md-8 d-flex flex-column justify-content-start card-text">
                <h3>{{ cardName }}</h3>
                <hr>
                <p class="fw-semibold">{{ typeLine }}</p>
                <p>
                    <ng-container *ngFor="let token of oracleText | manaSymbol">
                        <ng-container [ngSwitch]="token.type">
                            <img *ngSwitchCase="'symbol'"
                                [src]="'https://svgs.scryfall.io/card-symbols/' + token.value + '.svg'"
                                alt="{{token.value}}" class="mana-symbol">
                            <span *ngSwitchCase="'text'">{{ token.value }}</span>
                            <br *ngSwitchCase="'linebreak'">
                        </ng-container>
                    </ng-container>
                </p>
            </div>
        </div>

        <!-- Available Prints -->
        <div class="mt-4" *ngIf="prints.length > 0">
            <h4>Available Prints</h4>
            <ul class="list-unstyled">
                <li *ngFor="let print of prints">
                    <a [href]="print.imageUrl" target="_blank"
                       (mouseenter)="hoveredPrintImage = print.imageUrl"
                       (mouseleave)="hoveredPrintImage = null">
                        {{ print.setName }}
                    </a>
                </li>
            </ul>
        </div>

        <!-- No results / error -->
        <div class="text-center text-danger mt-3" *ngIf="errorMessage">
            {{ errorMessage }}
        </div>
    </div>
</div>
