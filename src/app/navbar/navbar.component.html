<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand">MTG Helper</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" routerLink="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/compare" routerLinkActive="active">Compare</a>
                </li>
            </ul>

            <form class="d-flex flex-nowrap align-items-start position-relative" role="search" (ngSubmit)="onSearch()">
                <div class="position-relative search-input-wrapper me-2">
                    <input class="form-control search-input" type="search" placeholder="Search" [(ngModel)]="searchTerm"
                        name="searchTerm" (input)="onInputChange()" (keydown)="handleKeyDown($event)"
                        (focus)="onInputFocus()" (blur)="onInputBlur()" />
                    <ul *ngIf="showSuggestions" class="list-group position-absolute shadow suggestions-dropdown">
                        <li *ngFor="let suggestion of suggestions; let i = index"
                            class="list-group-item list-group-item-action" [class.active]="i === activeIndex"
                            (click)="selectSuggestion(suggestion)">
                            <span [innerHTML]="suggestion | highlight:userInput"></span>
                        </li>
                    </ul>
                </div>
                <button type="button" class="btn btn-primary me-2" type="submit">Search</button>
                <button type="button" class="btn btn-outline-secondary dark-toggle-btn" (click)="toggleDarkMode()" [attr.aria-pressed]="isDarkMode" title="Toggle dark mode">
                    <span *ngIf="!isDarkMode" class="bi bi-moon-fill"></span>
                    <span *ngIf="isDarkMode" class="bi bi-sun-fill"></span>
                </button>
            </form>

        </div>
    </div>
</nav>
